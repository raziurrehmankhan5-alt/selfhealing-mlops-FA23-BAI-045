apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-blue-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      slot: blue
  template:
    metadata:
      labels:
        slot: blue
    spec:
      containers:
        - name: sentiment-api
          image: fa23bai0045/sentiment-api:unstable
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: logs-volume
              mountPath: /app/logs
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: logs-volume
          persistentVolumeClaim:
            claimName: sentiment-logs-pvc
