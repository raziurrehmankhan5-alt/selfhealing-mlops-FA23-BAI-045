groups:
  - name: ml_drift_detection
    interval: 10s
    rules:
      - alert: ModelConfidenceDrift
        expr: prediction_confidence_score < 0.64
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ML Model Confidence Drift Detected"
          description: "Prediction confidence has dropped below threshold 0.64 for more than 1 minute"
